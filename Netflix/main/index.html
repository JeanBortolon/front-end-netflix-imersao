<!DOCTYPE html>
<html lang="pt-br">

    <title>Netflix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <button id="theme-toggle" onclick="toggleTheme()" style="position:absolute;top:1rem;right:1rem;z-index:10;background:none;border:none;font-size:2rem;cursor:pointer" aria-label="Alternar tema"></button>
        <h1>Quem está assistindo?</h1>
        <section aria-label="Perfis disponíveis">
            <nav class="profiles">
                <ul>
                    <li>
                        <a href="../catalogo/catalogo.html" class="profile" data-name="Jean" data-img="../assets/perfil_1.jpg">
                            <figure>
                                <img src="../assets/perfil_1.jpg" alt="Um homem de aparencia gótica utilizando uma cartola">

                    </li>
                    <li>
                        <a href="../catalogo/catalogo.html" class="profile" data-name="Maria" data-img="../assets/perfil_2.jpg">

                            </figure>

                    </li>
                    <li>
                        <a href="../catalogo/catalogo.html" class="profile" data-name="Léia" data-img="../assets/perfil_3.jpg">

                    </li>
                    <li>
                        <a href="../catalogo/catalogo.html" class="profile" data-name="Antonio" data-img="../assets/perfil_4.jpg">
